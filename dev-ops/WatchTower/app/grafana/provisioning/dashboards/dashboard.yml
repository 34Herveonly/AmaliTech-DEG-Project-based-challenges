###############################################################################
# Grafana Dashboard Provisioning — Reyla Logistics WatchTower
# Tells Grafana where to find dashboard JSON files on the filesystem.
# Any .json file placed in /var/lib/grafana/dashboards is loaded automatically.
###############################################################################

apiVersion: 1

providers:
  - name: default
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
